<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ITIRR</title>
    <link rel="icon" type="image/png" href="img/logo.png" />
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <script src="https://kit.fontawesome.com/8a4f8a69d2.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/media-query.css" />
    <link rel="stylesheet" href="dashboardcss/style.css" />
    <link rel="stylesheet" href="dashboardcss/media-query.css" />
    <style>
        #app-loader {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-ring {
            position: relative;
            width: 110px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .loader-ring::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 70%;
                border: 3px dotted #6a0dad;
                animation: spin 7s linear infinite;
            }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loader-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 50%;
        }

        .loader-text {
            margin-top: 18px;
            font-family: 'Kanit', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #6a0dad;
            letter-spacing: 1px;
        }

        #toast-wrapper {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 320px;
            pointer-events: all;
        }

        .toast-item {
            background: #1a1a1a;
            color: #fff;
            border-radius: 12px;
            padding: 14px 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.35);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: toastSlideIn 0.35s ease;
            font-family: 'Kanit', sans-serif;
        }

        .toast-icon {
            margin-top: 2px;
            font-size: 16px;
        }

        .toast-body {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .toast-msg {
            font-size: 13px;
            opacity: 0.88;
            line-height: 1.4;
        }

        .toast-close {
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            opacity: 0.7;
            background: none;
            border: none;
            color: #fff;
            padding: 0;
            margin-left: 4px;
        }

            .toast-close:hover {
                opacity: 1;
            }

        .toast-success {
            border-left: 4px solid #16a34a;
        }

        .toast-error {
            border-left: 4px solid #dc2626;
        }

        .toast-warning {
            border-left: 4px solid #d97706;
        }

        .toast-info {
            border-left: 4px solid #2563eb;
        }

        .toast-success .toast-icon {
            color: #16a34a;
        }

        .toast-error .toast-icon {
            color: #dc2626;
        }

        .toast-warning .toast-icon {
            color: #d97706;
        }

        .toast-info .toast-icon {
            color: #2563eb;
        }

        @keyframes toastSlideIn {
            from {
                transform: translateX(110%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes toastSlideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(110%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <!-- APP LOADER -->
    <div id="app-loader">
        <div class="loader-ring">
            <img src="img/logo.png" alt="ITIRR" class="loader-logo" />
        </div>
    </div>

    <!-- BLAZOR APP -->
    <div id="app"></div>

    <!-- TOAST WRAPPER — lives outside Blazor, never destroyed on navigation -->
    <div id="toast-wrapper"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script src="dashboardcss/script.js"></script>

    <script>
        // ── TOAST FUNCTIONS ──
        window.showToast = function (message, type) {
            const wrapper = document.getElementById('toast-wrapper');
            if (!wrapper) return;

            const icons = {
                success: 'fa-circle-check',
                error: 'fa-circle-exclamation',
                warning: 'fa-triangle-exclamation',
                info: 'fa-circle-info'
            };
            const titles = {
                success: 'Success',
                error: 'Error',
                warning: 'Warning',
                info: 'Info'
            };

            const id = 'toast-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            const div = document.createElement('div');
            div.id = id;
            div.className = 'toast-item toast-' + type;
            div.innerHTML = `
                    <i class="fa-solid ${icons[type] || 'fa-bell'} toast-icon"></i>
                    <div class="toast-body">
                        <div class="toast-title">${titles[type] || 'Notice'}</div>
                        <div class="toast-msg">${message}</div>
                    </div>
                    <button class="toast-close" onclick="removeToast('${id}')">×</button>
                `;

            wrapper.appendChild(div);

            // Auto remove after 4 seconds
            setTimeout(() => removeToast(id), 4000);
        };

        window.removeToast = function (id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.animation = 'toastSlideOut 0.3s ease forwards';
            setTimeout(() => { if (el) el.remove(); }, 300);
        };

        // ── BLAZOR LOADER ──
        Blazor.start().then(function () {
            const loader = document.getElementById('app-loader');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.transition = 'opacity 0.7s ease';
                setTimeout(() => loader.remove(), 700);
            }
        });
    </script>

</body>
</html>
